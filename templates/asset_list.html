<!DOCTYPE html>
<html>
<head>
    <title>Assets</title>
    <style>
        body {
            font-family: Arial;
            background: #f7e9ec;
            padding: 30px;
        }
        .container {
            background: white;
            padding: 20px;
            border-radius: 10px;
        }
        .top-bar {
            display: flex;
            justify-content: space-between;
            margin-bottom: 15px;
        }
        .btn {
            background: #b54b5a;
            color: white;
            padding: 8px 14px;
            text-decoration: none;
            border-radius: 6px;
            margin-left: 5px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th {
            background: #b54b5a;
            color: white;
            padding: 10px;
        }
        td {
            padding: 10px;
            text-align: center;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Assets</h2>

    <div class="top-bar">
        <form method="GET">
            <input type="text" name="q" placeholder="Search asset" value="{{ query }}">
            <button class="btn">Search</button>
        </form>

        <div>
            <a href="{% url 'add_asset' %}" class="btn">Add Asset</a>
            <a href="{% url 'admin_dashboard' %}" class="btn">Dashboard</a>
        </div>
    </div>

    <table border="1">
        <tr>
            <th>Asset ID</th>
            <th>Name</th>
            <th>Brand</th>
            <th>Status</th>
            <th>Actions</th>
        </tr>

        {% for asset in assets %}
        <tr>
            <td>{{ asset.asset_id }}</td>
            <td>{{ asset.name }}</td>
            <td>{{ asset.brand }}</td>
            <td>{{ asset.status }}</td>
            <td>
                <a href="{% url 'edit_asset' asset.id %}" class="btn">Edit</a>
                <a href="{% url 'delete_asset' asset.id %}" class="btn">Delete</a>
            </td>
        </tr>
        {% empty %}
        <tr>
            <td colspan="5">No assets found.</td>
        </tr>
        {% endfor %}
    </table>
</div>

</body>
</html>
