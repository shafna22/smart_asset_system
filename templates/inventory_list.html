<!DOCTYPE html>
<html>
<head>
    <title>Inventory</title>
    <style>
        body {
            font-family: Arial;
            background: #f6e9ea;
            padding: 20px;
        }

        .container {
            background: white;
            padding: 20px;
            border-radius: 10px;
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            margin-bottom: 15px;
        }

        .search input {
            padding: 8px;
            border-radius: 5px;
            border: 1px solid #ccc;
        }

        .search button {
            padding: 8px 14px;
            background: #b04a5a;
            color: white;
            border: none;
            border-radius: 5px;
        }

        .actions a {
            padding: 8px 14px;
            margin-left: 10px;
            background: #b04a5a;
            color: white;
            text-decoration: none;
            border-radius: 5px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        thead {
            background: #b04a5a;
            color: white;
        }

        th, td {
            padding: 10px;
            text-align: left;
        }

        .low {
            color: red;
            font-weight: bold;
        }

        .ok {
            color: green;
            font-weight: bold;
        }

        .btn {
            padding: 5px 10px;
            border-radius: 4px;
            text-decoration: none;
            color: white;
            font-size: 13px;
        }

        .edit { background: #6c8cd5; }
        .delete { background: #e05a5a; }
    </style>
</head>
<body>

<div class="container">
    <h2>Inventory</h2>

    <!-- Top bar -->
    <div class="top-bar">
        <form method="get" class="search">
            <input type="text" name="q" placeholder="Search item..." value="{{ query }}">
            <button type="submit">Search</button>
        </form>

        <div class="actions">
            <a href="{% url 'add_inventory' %}">Add Item</a>
            <a href="{% url 'admin_dashboard' %}">Dashboard</a>
        </div>
    </div>

    <!-- Table -->
    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>Item Name</th>
                <th>Quantity</th>
                <th>Availability</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody>
        {% for item in items %}
            <tr>
                <td>{{ item.id }}</td>
                <td>{{ item.item_name }}</td>
                <td>{{ item.quantity }}</td>
                <td>
                    {% if item.quantity < 10 %}
                        <span class="low">Low Stock</span>
                    {% else %}
                        <span class="ok">Available</span>
                    {% endif %}
                </td>
                <td>
                    <a href="{% url 'edit_inventory' item.id %}" class="btn edit">Edit</a>
                    <a href="{% url 'delete_inventory' item.id %}" class="btn delete">Delete</a>
                </td>
            </tr>
        {% empty %}
            <tr>
                <td colspan="5">No items found.</td>
            </tr>
        {% endfor %}
        </tbody>
    </table>

</div>

</body>
</html>
