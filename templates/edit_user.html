<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Edit User</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f5f1f2;
            margin: 0;
            padding: 0;
        }

        .container {
            width: 500px;
            margin: 60px auto;
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        h2 {
            color: #b54b5c;
            margin-bottom: 20px;
        }

        label {
            font-weight: bold;
            display: block;
            margin-top: 15px;
        }

        input, select {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            border: 1px solid #ccc;
            border-radius: 5px;
        }

        .buttons {
            margin-top: 25px;
        }

        button {
            background: #b54b5c;
            color: white;
            border: none;
            padding: 10px 18px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
        }

        button:hover {
            background: #9d3e4c;
        }

        .cancel {
            background: gray;
            margin-left: 10px;
            text-decoration: none;
            color: white;
            padding: 10px 18px;
            border-radius: 5px;
        }

        .cancel:hover {
            background: #555;
        }
        .helptext {
    font-size: 12px;
    color: #777;
    margin-top: 3px;
    display: block;
}

input[type="checkbox"] {
    width: auto;
    margin-right: 8px;
}

.checkbox-field {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-top: 10px;
}
    </style>
</head>
<body>

<div class="container">
    <h2>Edit User</h2>

   <form method="POST">
    {% csrf_token %}

    <!-- Username -->
    <label>Username:</label>
    {{ form.username }}
    <span class="helptext">{{ form.username.help_text }}</span>

    <!-- Email -->
    <label>Email:</label>
    {{ form.email }}

    <!-- Role -->
    <label>Role:</label>
    {{ form.role }}

    <!-- Active -->
    <label>Active:</label>
    <div class="checkbox-field">
        {{ form.is_active }}
        <span class="helptext">
            Designates whether this user should be treated as active.
            Unselect this instead of deleting accounts.
        </span>
    </div>

    <div class="buttons">
        <button type="submit">Update User</button>
        <a href="{% url 'manage_users' %}" class="cancel">Cancel</a>
    </div>
</form>
</div>

</body>
</html>
