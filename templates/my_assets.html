<!DOCTYPE html>
<html>
<head>
    <title>My Assets</title>
    <style>
        body {
            font-family: Arial;
            background-color: #f5e6e8;
            padding: 30px;
        }

        h2 {
            color: #b44a5a;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
        }

        th, td {
            padding: 10px;
            border: 1px solid #ddd;
            text-align: center;
        }

        thead {
            background-color: #b44a5a;
            color: white;
        }

        .btn {
            padding: 8px 15px;
            background-color: #b44a5a;
            color: white;
            text-decoration: none;
            border-radius: 5px;
        }
    </style>
</head>
<body>

<h2>My Assigned Assets</h2>

<table>
    <thead>
        <tr>
            <th>Asset ID</th>
            <th>Name</th>
            <th>Brand</th>
            <th>Assigned Date</th>
        </tr>
    </thead>
    <tbody>
        {% for assignment in assignments %}
        <tr>
            <td>{{ assignment.asset.asset_id }}</td>
            <td>{{ assignment.asset.name }}</td>
            <td>{{ assignment.asset.brand }}</td>
            <td>{{ assignment.assigned_date }}</td>
        </tr>
        {% empty %}
        <tr>
            <td colspan="4">No assets assigned.</td>
        </tr>
        {% endfor %}
    </tbody>
</table>

<br>
<a href="{% url 'employee_dashboard' %}" class="btn"> Dashboard</a>

</body>
</html>
